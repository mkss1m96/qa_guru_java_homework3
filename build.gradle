plugins {
    id 'java'
    id 'io.qameta.allure' version '3.1.0'
}

repositories {
    mavenCentral()
}

allure {
    report {
        version.set("2.20.0") //версия Allure Report (https://github.com/allure-framework/allure2)
    }
    adapter { // отвечает за появление папочки build/allure-results
        aspectjWeaver.set(true) // обработка аннотации @Step
        frameworks {
            junit5 {
                adapterVersion.set("2.20.0") //версия Allure JUnit5 (https://mvnrepository.com/artifact/io.qameta.allure/allure-junit5)
            }
        }
    }
}

dependencies {
    testImplementation(
            "com.codeborne:selenide:7.14.0",
            "org.junit.jupiter:junit-jupiter:5.14.2",
            'org.junit.platform:junit-platform-launcher',
            "io.qameta.allure:allure-selenide:2.33.0"
    )
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.test {
    useJUnitPlatform()
    systemProperties(System.getProperties())
    testLogging {
        lifecycle {
            events "started", "skipped", "failed", "standard_error", "standard_out"
            exceptionFormat "short"
        }
    }
}